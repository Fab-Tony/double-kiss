<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2f6c"/><stop offset="1" stop-color="#0a1330"/>
    </linearGradient>
    <radialGradient id="b" cx="36%" cy="30%" r="80%">
      <stop offset="0" stop-color="#41539f"/><stop offset="0.52" stop-color="#1b2a74"/><stop offset="1" stop-color="#0c1440"/>
    </radialGradient>
    <radialGradient id="c" cx="36%" cy="30%" r="80%">
      <stop offset="0" stop-color="#fdfaec"/><stop offset="0.66" stop-color="#efe6c6"/><stop offset="1" stop-color="#d5c99f"/>
    </radialGradient>
  </defs>
  <!-- full-bleed background: iOS/Android apply their own rounded mask -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- balls centred inside the maskable safe zone -->
  <g transform="translate(90,94) scale(5.2)">
    <circle cx="42" cy="24" r="16.5" fill="url(#c)" stroke="#c7ba8c" stroke-width="0.8"/>
    <ellipse cx="36.5" cy="17.5" rx="5.5" ry="3.4" fill="#ffffff" opacity="0.65" transform="rotate(-28 36.5 17.5)"/>
    <circle cx="25" cy="39" r="20" fill="url(#b)" stroke="#080f2e" stroke-width="0.8"/>
    <ellipse cx="16.5" cy="30" rx="6.5" ry="4" fill="#e3e9ff" opacity="0.5" transform="rotate(-30 16.5 30)"/>
    <circle cx="25" cy="42" r="8.6" fill="#fcf9ef"/>
    <text x="25" y="42" text-anchor="middle" dominant-baseline="central" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="12.5" fill="#17235f">2</text>
  </g>
</svg>
