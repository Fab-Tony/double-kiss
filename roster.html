<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Roster · Double Kiss</title>
<link rel="stylesheet" href="styles.css?v=8">
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=8">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=8">
<link rel="manifest" href="manifest.json?v=8">
<meta name="theme-color" content="#0a1122">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Double Kiss">
</head>
<body data-page="roster">
<div class="wrap">
  <h1>Roster</h1>
  <div class="sub">Games by week — tap a match to see the lineup. Filter to one player to see when they play.</div>

  <div class="filterbar">
    <label for="filter">Show only</label>
    <select id="filter"><option value="">All players</option></select>
  </div>
  <div class="filterinfo" id="filterinfo"></div>

  <div class="games" id="games"></div>

  <h2>Squad &amp; finals targets</h2>
  <div class="rlist" id="squad"></div>

  <footer>Season 28 · Sydney Diamond League</footer>
</div>

<script src="data.js?v=8"></script>
<script src="app.js?v=8"></script>
<script>
(function () {
  const D = DK, esc = s => String(s).replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c]));
  const mi = D.nextMatchIndex();

  // filter options
  const sel = document.getElementById("filter");
  D.roster.forEach(p => { const o = document.createElement("option"); o.value = p.name; o.textContent = p.name; sel.appendChild(o); });

  // role lookup
  const roleOf = {}; D.roster.forEach(p => roleOf[p.name] = p.role);

  // build accordion of games
  const gwrap = document.getElementById("games");
  D.fixtures.forEach((f, idx) => {
    const isBye = f.ha === "Bye";
    const rostered = f.lineup.length;
    const shortNight = !isBye && rostered < 3;
    const g = document.createElement("div");
    g.className = "game" + (idx === mi ? " next" : "");
    g.dataset.wk = f.wk;

    let fitCls = "", fitTxt, tagHtml, title;
    if (isBye) {
      fitTxt = f.date.replace("Mon ", "") + " · no match";
      tagHtml = '<span class="tag bye">BYE</span>'; title = "Bye week";
    } else {
      fitCls = shortNight ? "short" : "";
      fitTxt = f.date.replace("Mon ", "") + " · T" + f.tbl + (shortNight ? " · fill-in needed" : "");
      tagHtml = '<span class="tag ' + f.ha.toLowerCase() + '">' + f.ha.toUpperCase() + '</span>';
      title = "vs " + esc(f.op);
    }
    const headInner = '<span class="gwk">W' + f.wk + '</span>' +
      '<span class="gmain"><b>' + title + '</b><small class="' + fitCls + '">' + fitTxt + '</small></span>' + tagHtml;
    const head = isBye
      ? '<div class="ghead flat">' + headInner + '</div>'
      : '<button class="ghead" type="button" aria-expanded="false">' + headInner + '<span class="chev" aria-hidden="true">›</span></button>';

    let body;
    if (isBye) {
      body = "";
    } else {
      const rows = f.lineup.map(name =>
        '<div class="row"><div><div class="nm">' + esc(name) + '</div>' +
        (roleOf[name] === "Captain" ? '<div class="rl">Captain</div>' : '') +
        '</div><div class="st in">Playing</div></div>').join("");
      const fillRow = shortNight
        ? '<div class="row out"><div><div class="nm">Fill-in needed</div><div class="rl">' +
          (3 - rostered) + ' more to field a legal team</div></div><div class="st out">TBC</div></div>'
        : "";
      const banner = shortNight
        ? '<div class="fitbanner short">Only ' + rostered + ' available this week — line up a fill-in or it\'s a forfeit risk.</div>'
        : "";
      body = '<div class="gbody">' + banner + '<div class="who">' + rows + fillRow + '</div></div>';
    }
    g.innerHTML = head + body;
    gwrap.appendChild(g);
  });

  const setOpen = (g, open) => {
    g.classList.toggle("open", open);
    const b = g.querySelector("button.ghead");
    if (b) b.setAttribute("aria-expanded", String(open));
  };

  // deep link (?wk=N from Home) or open the next match by default
  const wkParam = new URLSearchParams(location.search).get("wk");
  const target = wkParam ? gwrap.querySelector('.game[data-wk="' + wkParam + '"]') : null;
  const openEl = (target && target.querySelector("button.ghead")) ? target : gwrap.querySelector(".game.next");
  if (openEl) {
    setOpen(openEl, true);
    if (target) requestAnimationFrame(() => openEl.scrollIntoView({ block: "start" }));
  }

  // accordion — only one open at a time; keep the tapped card in view
  gwrap.addEventListener("click", e => {
    const h = e.target.closest("button.ghead");
    if (!h) return;
    const g = h.parentElement;
    const wasOpen = g.classList.contains("open");
    gwrap.querySelectorAll(".game.open").forEach(x => setOpen(x, false));
    if (!wasOpen) {
      setOpen(g, true);
      requestAnimationFrame(() => g.scrollIntoView({ block: "nearest" }));
    }
  });

  // player filter — show weeks that player is rostered to play
  const info = document.getElementById("filterinfo");
  const totalMatches = D.fixtures.filter(f => f.ha !== "Bye").length;
  sel.addEventListener("change", () => {
    const name = sel.value;
    let shown = 0;
    gwrap.querySelectorAll(".game").forEach(g => {
      const f = D.fixture(+g.dataset.wk);
      const show = !name ? true : f.lineup.includes(name);
      g.classList.toggle("hide", !show);
      if (show) shown++;
    });
    info.textContent = name ? (name + " is rostered for " + shown + " of the " + totalMatches + " matches.") : "";
  });

  // squad & finals targets
  document.getElementById("squad").innerHTML = D.roster.map(p => {
    const sched = D.scheduledGames(p), clear = p.out.length === 0;
    const leaveTxt = p.leave || (clear ? "Available all season" : "");
    const leaveStyle = clear ? "color:var(--home)" : "color:var(--away)";
    const role = p.role === "Captain"
      ? '<span style="color:var(--muted);font-weight:400;font-size:12px">· Captain</span>' : '';
    const pct = Math.min(100, Math.round(sched / p.target * 100));
    let cls, txt;
    if (!p.finals) { cls = "off"; txt = "Not contesting Finals — expected to drop after mid-Sept"; }
    else if (sched >= p.target) { cls = "ok"; txt = "On track — rostered for " + sched; }
    else { cls = "warn"; txt = "Only rostered " + sched + " of " + p.target + " needed"; }
    return '<div class="rcard"><div class="av">' + esc(p.name.slice(0, 1)) + '</div>' +
      '<div class="mid"><div class="nm">' + esc(p.name) + ' ' + role + '</div>' +
      '<div class="rl" style="' + leaveStyle + '">' + esc(leaveTxt) + '</div>' +
      '<div class="status ' + cls + '">' + txt + '</div>' +
      '<div class="bar"><span style="width:' + pct + '%"></span></div></div>' +
      '<div class="goal">' + sched + ' / ' + p.target + '<small>rostered / need</small></div></div>';
  }).join("");
})();
</script>
</body>
</html>
