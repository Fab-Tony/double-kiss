<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Double Kiss</title>
<link rel="stylesheet" href="styles.css?v=14">
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=14">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=14">
<link rel="manifest" href="manifest.json?v=14">
<meta name="theme-color" content="#0a1122">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Double Kiss">
</head>
<body data-page="home">
<div class="wrap">
  <h1>This Monday</h1>

  <div class="next" id="next"></div>

  <a class="btn" id="tablesbtn" href="tables.html" style="margin-top:12px">
    <span><b>Table allocations</b><small id="tablesbtnsub">Which tables every team's on this week</small></span>
    <span class="arw" aria-hidden="true">›</span>
  </a>

  <h2 id="whoHdr">Who's available</h2>
  <div class="who" id="who"></div>

  <h2>News</h2>
  <div class="news" id="news"></div>

  <h2><a class="h2link" href="roster.html">Upcoming <span class="arw" aria-hidden="true">›</span></a></h2>
  <div class="uplist" id="upcoming"></div>

  <footer>Sydney Diamond League · Club9, North Strathfield · Season 28</footer>
</div>

<script src="data.js?v=14"></script>
<script src="app.js?v=14"></script>
<script>
(function () {
  const D = DK, esc = s => String(s).replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c]));

  // next fixture (may be a bye)
  const ni = D.nextIndex();
  const nextEl = document.getElementById("next");
  if (ni === -1) {
    nextEl.innerHTML = '<div class="lbl">Season complete</div><div class="op">See you next season</div>';
  } else {
    const f = D.fixtures[ni];
    if (f.ha === "Bye") {
      nextEl.innerHTML = '<div class="lbl">Round ' + f.wk + ' · ' + f.date.replace("Mon ", "") + '</div>' +
        '<div class="op">Bye week</div><div class="meta">No match this week</div>';
    } else if (f.ha === "Finals") {
      nextEl.innerHTML = '<div class="lbl">' + esc(f.date) + '</div>' +
        '<div class="op">Finals</div>' +
        '<div class="meta">' + esc(f.op.replace("Finals — ", "")) + ' · Top 16 · ' + esc(D.VENUE) + '</div>' +
        '<span class="ha tag finals">FINALS</span>';
    } else {
      nextEl.innerHTML = '<div class="lbl">Round ' + f.wk + ' · ' + f.date + '</div>' +
        '<div class="op">vs ' + esc(f.op) + '</div>' +
        '<div class="meta">Table ' + f.tbl + ' · ' + esc(D.VENUE) + ' · 7pm</div>' +
        '<span class="ha tag ' + f.ha.toLowerCase() + '">' + f.ha.toUpperCase() + '</span>';
    }
  }

  // lineup for the next actual match
  const mi = D.nextMatchIndex();
  const whoHdr = document.getElementById("whoHdr");
  const who = document.getElementById("who");
  const roleOf = {}, ratingOf = {}; D.roster.forEach(p => { roleOf[p.name] = p.role; ratingOf[p.name] = p.r; });
  if (mi === -1) {
    whoHdr.textContent = "Lineup";
    who.innerHTML = '<div class="empty">No upcoming matches.</div>';
  } else {
    const f = D.fixtures[mi], rostered = f.lineup.length, shortNight = rostered < 3;
    whoHdr.textContent = "Lineup · Wk " + f.wk + " vs " + f.op;
    let rows = f.lineup.map(name => '<div class="row"><div class="nm">' + esc(name) + '</div>' +
      (ratingOf[name] != null ? '<div class="fargo">(' + ratingOf[name] + ')</div>' : '') + '</div>').join("");
    if (shortNight) rows += '<div class="row out"><div><div class="nm">Fill-in needed</div><div class="rl">' +
      (3 - rostered) + ' more</div></div><div class="st out">TBC</div></div>';
    who.innerHTML = rows;
  }

  // news — sub-needed alerts first, from live lineup data
  const alerts = ni === -1 ? "" : D.fixtures.filter((f, i) =>
    i >= ni && D.isMatch(f) && f.lineup.length < 3).map(f =>
    '<div class="fitbanner short">We need a sub — Wk ' + f.wk + ' (' + f.date +
    ') vs ' + esc(f.op) + ': only ' + f.lineup.length + ' rostered.</div>').join("");
  document.getElementById("news").innerHTML = alerts + D.news.map(n =>
    '<div class="item"><div class="d">' + esc(n.date) + '</div><div class="t">' + esc(n.title) +
    '</div><div class="b">' + esc(n.body) + '</div></div>').join("");

  // upcoming (next 5, byes included)
  const up = document.getElementById("upcoming");
  if (ni === -1) { up.innerHTML = '<div class="empty">Season finished.</div>'; }
  else {
    up.innerHTML = D.fixtures.slice(ni, ni + 5).map(f => {
      const parts = f.date.split(" ").slice(-2);   // ["20","Jul"] — weekday-agnostic
      const cal = '<div class="cal"><span class="mon">' + esc(parts[1] || "") + '</span>' +
        '<span class="day">' + esc(parts[0] || "") + '</span></div>';
      if (f.ha === "Bye") {
        return '<div class="up bye">' + cal + '<div class="upmain"><div class="upt">Bye week</div>' +
          '<div class="ups">Week ' + f.wk + '</div></div></div>';
      }
      if (f.ha === "Finals") {
        return '<div class="up finals">' + cal + '<div class="upmain"><div class="upt">Finals</div>' +
          '<div class="ups">' + esc(f.date) + ' · Top 16</div></div></div>';
      }
      const ha = f.ha === "Home" ? "(H)" : "(A)";
      return '<div class="up">' + cal + '<div class="upmain">' +
        '<div class="upt">vs ' + esc(f.op) + ' ' + ha + '</div>' +
        '<div class="ups">Week ' + f.wk + ' · Table ' + f.tbl + '</div></div></div>';
    }).join("");
  }

  // table-allocations link subtitle → current round
  const tb = document.getElementById("tablesbtnsub");
  if (tb) {
    if (ni === -1) tb.textContent = "Season complete";
    else {
      const ff = D.fixtures[ni];
      tb.textContent = D.isMatch(ff)
        ? ("Round " + ff.wk + " · " + ff.date.replace("Mon ", "") + " — where every team's playing")
        : "The weekly table draw for every team";
    }
  }
})();
</script>
</body>
</html>
