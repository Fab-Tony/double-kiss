<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Double Kiss</title>
<link rel="stylesheet" href="styles.css?v=6">
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=6">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=6">
<link rel="manifest" href="manifest.json?v=6">
<meta name="theme-color" content="#0a1122">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Double Kiss">
</head>
<body data-page="home">
<div class="wrap">
  <h1>This Monday</h1>
  <div class="sub" id="sub">—</div>

  <div class="next" id="next"></div>

  <h2 id="whoHdr">Who's available</h2>
  <div id="fitBanner"></div>
  <div class="who" id="who"></div>

  <h2>News</h2>
  <div class="news" id="news"></div>

  <h2>Upcoming</h2>
  <div class="linkrow" id="upcoming"></div>

  <footer>Sydney Diamond League · Club9, North Strathfield · Season 28</footer>
</div>

<script src="data.js?v=6"></script>
<script src="app.js?v=6"></script>
<script>
(function () {
  const D = DK, esc = s => String(s).replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c]));

  // next fixture (may be a bye)
  const ni = D.nextIndex();
  const nextEl = document.getElementById("next");
  const sub = document.getElementById("sub");
  sub.textContent = D.TEAM + " · " + D.SEASON + " · " + D.LEAGUE;
  if (ni === -1) {
    nextEl.innerHTML = '<div class="lbl">Season complete</div><div class="op">See you next season</div>';
  } else {
    const f = D.fixtures[ni];
    if (f.ha === "Bye") {
      nextEl.innerHTML = '<div class="lbl">Round ' + f.wk + ' · ' + f.date.replace("Mon ", "") + '</div>' +
        '<div class="op">Bye week</div><div class="meta">No match this week</div>';
    } else {
      nextEl.innerHTML = '<div class="lbl">Round ' + f.wk + ' · ' + f.date + '</div>' +
        '<div class="op">vs ' + esc(f.op) + '</div>' +
        '<div class="meta">Table ' + f.tbl + ' · ' + esc(D.VENUE) + ' · 7pm</div>' +
        '<span class="ha tag ' + f.ha.toLowerCase() + '">' + f.ha.toUpperCase() + '</span>';
    }
  }

  // lineup for the next actual match
  const mi = D.nextMatchIndex();
  const whoHdr = document.getElementById("whoHdr");
  const fb = document.getElementById("fitBanner");
  const who = document.getElementById("who");
  const roleOf = {}; D.roster.forEach(p => roleOf[p.name] = p.role);
  if (mi === -1) {
    whoHdr.textContent = "Lineup";
    who.innerHTML = '<div class="empty">No upcoming matches.</div>';
  } else {
    const f = D.fixtures[mi], rostered = f.lineup.length, shortNight = rostered < 3;
    whoHdr.textContent = "Lineup · Wk " + f.wk + " vs " + f.op;
    if (shortNight) { fb.className = "fitbanner short"; fb.textContent = "Only " + rostered + " rostered — line up a fill-in or it's a forfeit risk."; }
    else { fb.className = "fitbanner ok"; fb.textContent = "Lineup set — 3 playing."; }
    let rows = f.lineup.map(name =>
      '<div class="row"><div><div class="nm">' + esc(name) + '</div><div class="rl">' +
      esc(roleOf[name] || "Player") + '</div></div><div class="st in">Playing</div></div>').join("");
    if (shortNight) rows += '<div class="row out"><div><div class="nm">Fill-in needed</div><div class="rl">' +
      (3 - rostered) + ' more</div></div><div class="st out">TBC</div></div>';
    who.innerHTML = rows;
  }

  // news
  document.getElementById("news").innerHTML = D.news.map(n =>
    '<div class="item"><div class="d">' + esc(n.date) + '</div><div class="t">' + esc(n.title) +
    '</div><div class="b">' + esc(n.body) + '</div></div>').join("");

  // upcoming (next 5, byes included)
  const up = document.getElementById("upcoming");
  if (ni === -1) { up.innerHTML = '<div class="empty">Season finished.</div>'; }
  else {
    up.innerHTML = D.fixtures.slice(ni, ni + 5).map(f => {
      const right = f.ha === "Bye" ? '<span class="tag bye">BYE</span>'
        : '<span class="tag ' + f.ha.toLowerCase() + '">' + f.ha.toUpperCase() + ' · T' + f.tbl + '</span>';
      const opp = f.ha === "Bye" ? "Bye week" : "vs " + esc(f.op);
      return '<div class="btn"><span><b>' + opp + '</b><small>Wk ' + f.wk + ' · ' + f.date + '</small></span>' + right + '</div>';
    }).join("");
  }
})();
</script>
</body>
</html>
